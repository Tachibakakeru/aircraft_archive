<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>天空檔案 — 全球航空公司</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" href="assets/icon.svg" type="image/svg+xml">
<meta name="theme-color" content="#0b1220">
<link rel="stylesheet" href="css/style.css?v=90">
<link rel="stylesheet" href="css/compare.css?v=90">
<link rel="stylesheet" href="css/airports.css?v=90">
<link rel="stylesheet" href="css/airlines.css?v=90">
<script src="js/theme.js?v=90"></script>
<script src="js/i18n.js?v=90"></script>
</head>
<body>

<div class="fleet-wrap">
  <div class="fleet-head">
    <a class="eyebrow home-link" href="index.html" data-i18n="airlines.eyebrow">SKY ARCHIVE / 天空檔案</a>
    <h1 data-i18n="airlines.title">全球航空公司</h1>
    <div class="sub" data-i18n="airlines.lede">AIRLINE INDEX — 公司資訊、機隊組成與代表性航線，獨立於飛行器圖鑑與機場跑道</div>
  </div>

  <div class="fleet-toolbar">
    <input type="search" id="al-search" class="search-input" data-i18n-ph="airlines.search" placeholder="搜尋公司名稱 / 代號 / 國家…">
    <select class="ed-entry" id="al-alliance"></select>
    <select class="ed-entry" id="al-tier"></select>
    <label class="ed-entry apt-fav-toggle"><input type="checkbox" id="al-fav-only"><span data-i18n="airports.favonly">⭐ 只看收藏</span></label>
    <button class="ed-entry" id="al-view-toggle" data-i18n="airlines.view.map">🌐 航線地圖</button>
    <button class="ed-entry" id="al-cmp-open" data-i18n="fleet.compare">⇄ 比較</button>
    <a class="ed-entry" href="fleet.html" data-i18n="nav.fleet">✈️ 飛行器圖鑑</a>
    <a class="ed-entry" href="airports.html" data-i18n="nav.airports">🛬 機場與跑道</a>
    <a class="ed-entry" href="distance.html" data-i18n="nav.distance">📏 距離計算</a>
    <a class="ed-entry" href="index.html" data-i18n="nav.home">🏠 首頁</a>
    <button class="ed-entry" id="btn-lang" title="Language">繁中</button>
    <button class="ed-entry" id="btn-theme" data-i18n-title="viewer.theme" title="切換主題">◐</button>
  </div>

  <div class="apt-globe-wrap" id="al-globe-wrap" hidden>
    <div class="apt-globe-controls">
      <button id="al-globe-rotate" aria-pressed="true" data-i18n="viewer.rotate">自動旋轉</button>
      <button id="al-globe-reset" data-i18n="viewer.reset">重置視角</button>
    </div>
    <div class="apt-globe-hint" data-i18n="airlines.view.mapHint">拖曳旋轉・滾輪縮放・點選左側航空公司查看其航線</div>
  </div>

  <div class="al-count" id="al-count"></div>

  <div class="al-list" id="al-list"></div>
  <div class="al-empty" id="al-empty" hidden data-i18n="airlines.empty">找不到符合的航空公司，換個關鍵字試試。</div>

  <div class="al-legend">
    <span class="al-legend-item"><span class="al-alliance-dot star"></span><span data-i18n="airlines.alliance.star">星空聯盟</span></span>
    <span class="al-legend-item"><span class="al-alliance-dot skyteam"></span><span data-i18n="airlines.alliance.skyteam">天合聯盟</span></span>
    <span class="al-legend-item"><span class="al-alliance-dot oneworld"></span><span data-i18n="airlines.alliance.oneworld">寰宇一家</span></span>
    <span class="al-legend-item"><span class="al-alliance-dot none"></span><span data-i18n="airlines.alliance.none">獨立營運</span></span>
  </div>

  <div class="al-disclaimer" data-i18n="airlines.disclaimer">
    ＊機隊規模與型別統計為概估數字（依公開常識彙整，非即時營運資料，實際機隊持續變動），航線僅列代表性目的地、非完整航線網路。
  </div>
</div>

<!-- 航空公司詳情面板 -->
<aside id="panel" aria-hidden="true">
  <div class="panel-head">
    <span id="al-p-logo"></span>
    <div class="eyebrow" id="al-p-codes">AIRLINE</div>
    <h2 id="al-p-name">—</h2>
    <div class="en" id="al-p-sub"></div>
    <span class="al-tier-tag" id="al-p-tier"></span>
    <button id="al-p-cmp" class="apt-p-fav al-p-cmp" aria-pressed="false" data-i18n-title="airports.detail.addCompare" title="加入比較">⇄</button>
    <button id="al-p-edit" class="apt-p-fav al-p-edit" title="編輯">✎</button>
    <button id="al-p-fav" class="apt-p-fav" aria-pressed="false" title="收藏">☆</button>
    <button id="al-p-close" class="panel-close-btn" aria-label="關閉面板" data-i18n-aria="viewer.panel.close">✕</button>
  </div>
  <div class="panel-body">
    <img id="al-p-photo" class="al-p-photo" hidden alt="">
    <dl id="al-p-info"></dl>

    <div class="al-section-title" data-i18n="airlines.detail.fleet">FLEET / 機隊組成</div>
    <div id="al-p-fleet"></div>

    <div class="al-section-title" data-i18n="airlines.detail.routes">ROUTES / 代表性航線</div>
    <div id="al-p-routes"></div>

    <p class="al-p-tagline" id="al-p-tagline"></p>

    <div class="al-edit" id="al-edit" hidden>
      <div class="al-section-title">編輯 / EDIT</div>
      <div class="al-edit-grid">
        <label>公司名稱<input type="text" id="al-e-name"></label>
        <label>中文名稱（台灣）<input type="text" id="al-e-namezh" placeholder="例：美國航空"></label>
        <label>日文名稱<input type="text" id="al-e-nameja" placeholder="例：アメリカン航空"></label>
        <label>ICAO<input type="text" id="al-e-icao" maxlength="4"></label>
        <label>IATA<input type="text" id="al-e-iata" maxlength="3"></label>
        <label>成立年份<input type="number" id="al-e-founded"></label>
        <label>聯盟
          <select id="al-e-alliance">
            <option value="none">獨立營運</option>
            <option value="star">星空聯盟</option>
            <option value="skyteam">天合聯盟</option>
            <option value="oneworld">寰宇一家</option>
          </select>
        </label>
        <label>分級
          <select id="al-e-tier">
            <option value="">未分類</option>
            <option value="mainline">Mainline</option>
            <option value="regional">Regional</option>
            <option value="lcc">LCC</option>
          </select>
        </label>
      </div>
      <label class="al-edit-full">國家／地區（中／英／日，逗號分隔可留同值）
        <input type="text" id="al-e-country-zh" placeholder="中文">
        <input type="text" id="al-e-country-en" placeholder="English">
        <input type="text" id="al-e-country-ja" placeholder="日本語">
      </label>
      <label class="al-edit-full">主要樞紐（以逗號分隔，可直接輸入 ICAO/IATA 代碼如 NRT／RJAA，顯示時會自動轉成機場名稱並上連結）<input type="text" id="al-e-hubs" placeholder="RCTP, NRT"></label>
      <label class="al-edit-full">機隊總數<input type="number" id="al-e-fleettotal"></label>
      <label class="al-edit-full">機隊組成（每行一筆，格式：機型：數量：對應機型ID（選填））
        <textarea id="al-e-fleet" rows="3" placeholder="Airbus A350-900：14：a350"></textarea>
      </label>
      <label class="al-edit-full">代表性航線（以逗號分隔，同樣可輸入 ICAO/IATA 代碼）<textarea id="al-e-routes" rows="2" placeholder="NRT, LAX, 洛杉磯"></textarea></label>
      <label class="al-edit-full">簡介（中文）<textarea id="al-e-tagline-zh" rows="3"></textarea></label>
      <label class="al-edit-full">簡介（English）<textarea id="al-e-tagline-en" rows="3"></textarea></label>
      <label class="al-edit-full">簡介（日本語）<textarea id="al-e-tagline-ja" rows="3"></textarea></label>
      <label class="al-edit-full">自訂 Logo 網址（留空則使用官方尾翼 logo）<input type="text" id="al-e-customlogo" placeholder="https://... 或上傳"></label>
      <label class="al-edit-full">封面照片
        <input type="text" id="al-e-photo" placeholder="https://...">
        <input type="file" id="al-e-photo-file" accept="image/*">
      </label>
      <div class="al-edit-actions">
        <button id="al-edit-save">儲存到網站</button>
        <button id="al-edit-clear" class="ghost">清除本機暫存</button>
      </div>
    </div>
  </div>
</aside>

<div class="apt-cmp-tray" id="al-cmp-tray" hidden>
  <div class="apt-cmp-chips" id="al-cmp-chips"></div>
  <button class="apt-cmp-go" id="al-cmp-go" data-i18n="airports.detail.compareGo">⇄ 開始比較</button>
</div>

<div class="apt-cmp-modal" id="al-cmp-modal" hidden>
  <div class="apt-cmp-modal-head">
    <h2 data-i18n="airlines.compareTitle">航空公司比較</h2>
    <button id="al-cmp-modal-close" class="ed-entry" aria-label="關閉" data-i18n-aria="viewer.panel.close">✕</button>
  </div>
  <div class="apt-cmp-modal-body">
    <div class="cmp-pickers" id="al-cmp-pickers"></div>
    <div class="cmp-table-wrap">
      <table class="cmp-table" id="al-cmp-table"></table>
    </div>
  </div>
</div>

<script src="js/auth.js?v=90"></script>
<script src="js/storage.js?v=90"></script>
<script src="js/globe.js?v=90"></script>
<script src="js/airlines.js?v=90"></script>
<script src="js/ui.js?v=90"></script>
</body>
</html>
