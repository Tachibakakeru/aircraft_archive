<!DOCTYPE html>
<html lang="zh-Hant" class="viewer-root">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>天空檔案 — 3D 檢視</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" href="assets/icon.svg" type="image/svg+xml">
<meta name="theme-color" content="#0b1220">
<link rel="stylesheet" href="css/style.css?v=120">
</head>
<body class="viewer">

<canvas id="scene"></canvas>

<!-- 3D 標註點層（覆蓋在 canvas 上，跟隨模型部位） -->
<div id="hotspots"></div>

<div class="v-header">
  <div class="brand">
    <a class="back" href="fleet.html" data-i18n="fleet.back">← FLEET / 機隊列表</a>
    <a class="eyebrow home-link" href="index.html" data-i18n="brand.eyebrow">SKY ARCHIVE / 天空檔案</a>
    <h1 id="craft-title">—</h1>
    <div class="sub" id="craft-sub"></div>
  </div>
  <div class="v-header-right">
    <div class="v-tools">
      <button id="btn-lang" class="tool-btn" title="Language">繁中</button>
      <button id="btn-unit" class="tool-btn" data-i18n-title="viewer.units" title="單位">m·ft</button>
      <button id="btn-theme" class="tool-btn" data-i18n-title="viewer.theme" title="切換主題">◐</button>
      <button id="btn-specs" class="tool-btn" data-i18n="viewer.specs" title="詳細規格">☰ 規格</button>
      <a href="compare.html" class="tool-btn" data-i18n="viewer.compare" title="機型比較">⇄ 比較</a>
    </div>
    <div class="hint">
      <span data-i18n="viewer.hint.drag">拖曳 — 旋轉視角</span><br>
      <span data-i18n="viewer.hint.zoom">滾輪 / 雙指 — 縮放</span><br>
      <span data-i18n="viewer.hint.click">點擊部位 — 開啟解說</span>
    </div>
  </div>
</div>

<div class="controls">
  <button id="btn-rotate" aria-pressed="true" data-i18n="viewer.rotate">自動旋轉</button>
  <button id="btn-reset" data-i18n="viewer.reset">重置視角</button>
  <button id="btn-hotspots" aria-pressed="true" data-i18n="viewer.hotspots">標註點</button>
  <button id="btn-tour" aria-pressed="false" data-i18n="viewer.tour">導覽</button>
  <button id="btn-deploy" aria-pressed="false" data-i18n="viewer.deploy" hidden>展開操縱面</button>
  <button id="btn-shot" data-i18n="viewer.screenshot">截圖</button>
</div>

<nav class="chips" id="chips" aria-label="部位快選" data-i18n-aria="viewer.chips.aria"></nav>

<svg id="callout-svg" aria-hidden="true">
  <circle id="co-dot" r="4" style="display:none"></circle>
  <line id="co-line" style="display:none"></line>
</svg>
<div id="callout-label"></div>

<aside id="panel" aria-hidden="true">
  <div class="panel-head">
    <div class="eyebrow" data-i18n="viewer.component">COMPONENT</div>
    <h2 id="p-title"></h2>
    <div class="en" id="p-en"></div>
    <button id="panel-close" aria-label="關閉面板" data-i18n-aria="viewer.panel.close">✕</button>
  </div>
  <div class="panel-body">
    <p id="p-summary"></p>
    <ul id="p-bullets" class="bullets"></ul>
    <div id="p-images" class="gallery"></div>
    <div class="spec-title" id="p-spec-title" data-i18n="viewer.spectitle">SPECIFICATIONS / 規格</div>
    <dl id="p-specs"></dl>
    <div class="factbox" id="p-factbox"><b data-i18n="viewer.fact">DID YOU KNOW / 冷知識</b><span id="p-fact"></span></div>
  </div>
</aside>

<!-- 詳細規格抽屜 -->
<aside id="spec-drawer" aria-hidden="true">
  <div class="panel-head">
    <div class="eyebrow" data-i18n="viewer.fullspec">FULL SPECIFICATIONS</div>
    <h2 id="spec-craft-name">詳細規格</h2>
    <button id="spec-close" aria-label="關閉規格" data-i18n-aria="viewer.spec.close">✕</button>
  </div>
  <div class="panel-body">
    <div id="seatmap-wrap" class="seatmap-wrap" hidden></div>
    <div id="spec-body"></div>
  </div>
</aside>

<div class="credit" id="credit"></div>

<div id="overlay">
  <div class="tag">LOADING AIRFRAME</div>
  <div class="msg" id="overlay-msg" data-i18n="viewer.loading">正在載入機體幾何與部位資料……</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="js/theme.js?v=120"></script>
<script src="js/i18n.js?v=120"></script>
<script src="js/viewer.js?v=120"></script>
</body>
</html>
