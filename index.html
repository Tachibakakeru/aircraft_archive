<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>天空檔案 SKY ARCHIVE</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" href="assets/icon.svg" type="image/svg+xml">
<meta name="theme-color" content="#0b1220">
<link rel="stylesheet" href="css/style.css?v=34">
<link rel="stylesheet" href="css/home.css?v=34">
<script src="js/theme.js?v=34"></script>
<script src="js/i18n.js?v=34"></script>
</head>
<body>

<div class="home-tools">
  <button class="tool-btn" id="btn-lang" title="Language">繁中</button>
  <button class="tool-btn" id="btn-theme" data-i18n-title="viewer.theme" title="切換主題">◐</button>
</div>

<div class="home-wrap">
  <div class="home-head">
    <div class="eyebrow" data-i18n="brand.eyebrow">SKY ARCHIVE / 天空檔案</div>
    <h1 data-i18n="home.title">歡迎光臨天空檔案</h1>
    <div class="sub" data-i18n="home.sub">選擇要探索的資料庫</div>
  </div>

  <div class="home-modes">
    <a class="home-card" href="fleet.html">
      <span class="icon">✈️</span>
      <h2 data-i18n="home.fleet.title">飛行器圖鑑</h2>
      <p data-i18n="home.fleet.desc">40 款機型的 3D 互動檢視、規格比對與家族系譜</p>
      <span class="stat">40 AIRCRAFT</span>
    </a>
    <a class="home-card" href="airports.html">
      <span class="icon">🛬</span>
      <h2 data-i18n="home.airports.title">機場與跑道</h2>
      <p data-i18n="home.airports.desc">全球機場搜尋、跑道明細與 ICAO／IATA 代號</p>
      <span class="stat">85,716 AIRPORTS</span>
    </a>
  </div>

  <div class="home-foot" data-i18n="home.foot">SKY ARCHIVE — 飛行器與機場的互動資料庫</div>
</div>

<script>
I18N.apply();
I18N.mountSelector(document.getElementById("btn-lang"));
document.getElementById("btn-theme").addEventListener("click", () => window.HangarTheme.toggle());
document.addEventListener("langchange", () => I18N.apply());
</script>
</body>
</html>
