<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>天空檔案 — 機型比較</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" href="assets/icon.svg" type="image/svg+xml">
<meta name="theme-color" content="#0b1220">
<link rel="stylesheet" href="css/style.css?v=119">
<link rel="stylesheet" href="css/compare.css?v=119">
<script src="js/theme.js?v=119"></script>
<script src="js/i18n.js?v=119"></script>
</head>
<body>

<div class="cmp-topbar">
  <a class="back" href="fleet.html" data-i18n="fleet.back">← FLEET / 機隊列表</a>
  <div class="cmp-title">
    <span class="eyebrow" data-i18n="compare.eyebrow">COMPARE / 機型比較</span>
    <h1 data-i18n="compare.title" id="cmp-h1">並排比較規格</h1>
  </div>
  <label class="cmp-difftoggle"><input type="checkbox" id="cmp-diff"><span data-i18n="compare.difftoggle">只顯示差異</span></label>
  <button id="btn-lang" class="tool-btn" title="Language">繁中</button>
  <button id="btn-unit" class="tool-btn" data-i18n-title="viewer.units" title="單位">m·ft</button>
  <button id="btn-theme" class="tool-btn" data-i18n-title="viewer.theme" title="切換主題">◐</button>
</div>

<div class="cmp-pickers" id="cmp-pickers"></div>

<div class="cmp-size" id="cmp-size"></div>

<div class="cmp-table-wrap">
  <table class="cmp-table" id="cmp-table"></table>
  <div id="cmp-empty" class="cmp-empty" data-i18n="compare.empty">請於上方選擇至少一架機型開始比較。</div>
</div>

<script src="js/compare.js?v=119"></script>
<script src="js/ui.js?v=119"></script>
